<style>
    h4 {
      margin: 0;
    }

    .container {
      display: flex;
      gap: 20px;
      width: 100%;
    }

    .form-column {
      display: flex;
      flex: 1;
      flex-direction: column;
      min-width: 0;
    }

    .form-column h4 {
        margin: 6px;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      margin-top: 0;
      margin-bottom: 24px;
      justify-items: start;
      align-items: start;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
</style>

<div class="container">
    <section class="form-column">
        <h4>IP Networks (CIDR)</h4>
        <textarea
                id="subnets"
                name="subnets"
                rows="8"
                style="height: 500px; resize: none; line-height: 2;"
                placeholder="10.0.1.0/24&#10;192.168.5.0/24&#10;"
                required
        ></textarea>
    </section>
    <div style="display: flex; gap: 20px; flex-direction: column; flex: 1;">
        <section class="form-column">
            <div class="options-container">
                <h4>Output</h4>
                <label class="option-item">
                    <input type="checkbox" name="fqdn" value="-n" checked>
                    Resolve Hostname
                </label>
            </div>
            <div class="options-container">
                <h4>Filters</h4>
                <label class="option-item">
                    <input type="radio" name="filters" value="" checked>
                    Show all
                </label>
                <label class="option-item">
                    <input type="radio" name="filters" value="-a">
                    Alive only
                </label>
                <label class="option-item">
                    <input type="radio" name="filters" value="-u">
                    Unreachable only
                </label>
            </div>
        </section>
    </div>
</div>
